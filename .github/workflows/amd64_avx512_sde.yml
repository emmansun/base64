# Test AVX512 VBMI paths using Intel SDE (Software Development Emulator).
# Intel SDE emulates Ice Lake CPUID on any x86-64 host, so cpu.X86.HasAVX512VBMI
# returns true at runtime even on runners without physical AVX512 hardware.
#
# The download URL is extracted dynamically from Intel's download page (data-href
# attribute), following the same technique used by simd-everywhere/simde.

name: amd64-avx512-sde

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SDE_DOWNLOAD_PAGE: https://www.intel.com/content/www/us/en/download/684897/intel-software-development-emulator.html
  SDE_INSTALL_DIR: /opt/intel/sde

jobs:

  test:
    strategy:
      matrix:
        go-version: [1.25.x]
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Allow ptrace (required by Intel SDE / Pin on Ubuntu)
      run: sudo sysctl -w kernel.yama.ptrace_scope=0

    - name: Cache Intel SDE
      id: cache-sde
      uses: actions/cache@v4
      with:
        path: ${{ env.SDE_INSTALL_DIR }}
        key: intel-sde-${{ env.SDE_DOWNLOAD_PAGE }}

    - name: Download and install Intel SDE
      if: steps.cache-sde.outputs.cache-hit != 'true'
      run: |
        URL="$(curl -sL "${SDE_DOWNLOAD_PAGE}" | \
          grep -oP '(?<=data-href=")(https://[^"]+)/sde-external-([0-9.\-]+)-lin\.tar\.xz' | \
          head -n1)"
        echo "Downloading SDE from: ${URL}"
        mkdir -p "${SDE_INSTALL_DIR}"
        curl -sL "${URL}" | tar --strip-components 1 -JxC "${SDE_INSTALL_DIR}"

    - name: Build test binary
      run: go test -c -o base64.test .

    - name: Test AVX512 VBMI (via Intel SDE, emulating Ice Lake)
      # -icl: emulate Ice Lake (AVX512F + AVX512BW + AVX512VBMI)
      run: ${SDE_INSTALL_DIR}/sde64 -icl -- ./base64.test -test.run 'AVX512' -test.v

    - name: Benchmark AVX512 VBMI (via Intel SDE, 1 iteration each)
      run: ${SDE_INSTALL_DIR}/sde64 -icl -- ./base64.test -test.bench 'AVX512' -test.benchtime 1x -test.run '^$' -test.v


